    type: effort_controllers/JointPositionController
    joint: Revolute 4
    pid: {p: 100.0, i: 0.01, d: 10.0}
  Revolute 5_position_controller:
    type: effort_controllers/JointPositionController
    joint: Revolute 5
    pid: {p: 100.0, i: 0.01, d: 10.0}
  Revolute 8_position_controller:
    type: effort_controllers/JointPositionController
    joint: Revolute 8
    pid: {p: 100.0, i: 0.01, d: 10.0}
  Revolute 10_position_controller:
    type: effort_controllers/JointPositionController
    joint: Revolute 10
    pid: {p: 100.0, i: 0.01, d: 10.0}
  Revolute 12_position_controller:
    type: effort_controllers/JointPositionController
    joint: Revolute 12
    pid: {p: 100.0, i: 0.01, d: 10.0}
